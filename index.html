<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>経路検索＆グリッド可視化ツール</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-card">
      <h2>パスワード認証</h2>
      <p>ツールを起動するにはパスワードを入力してください。</p>
      <input id="password-input" type="password" placeholder="パスワードを入力" />
      <button id="unlock-button">開く</button>
      <p class="auth-error" id="auth-error"></p>
    </div>
  </div>

  <div class="app-shell hidden">
    <aside class="control-panel">
      <h1>グリッド変換ツール</h1>
      <div class="control-group">
        <label for="origin-input">出発地</label>
        <input id="origin-input" type="text" placeholder="出発地を入力" />
      </div>
      <div class="control-group">
        <label for="destination-input">目的地</label>
        <input id="destination-input" type="text" placeholder="目的地を入力" />
      </div>
      <div class="control-group">
        <button id="search-route">経路検索</button>
      </div>
      <div class="info-box">
        <label for="route-info">所要時間 / 距離</label>
        <textarea id="route-info" readonly placeholder="経路検索後に表示されます"></textarea>
      </div>
      <div class="control-group">
        <label for="grid-size">グリッドサイズ</label>
        <select id="grid-size">
          <option value="0">なし</option>
          <option value="50">50m</option>
          <option value="100">100m</option>
          <option value="250">250m</option>
          <option value="500">500m</option>
          <option value="1000">1km</option>
        </select>
      </div>
      <p class="note">地図を移動・ズームすると、表示領域に合わせてグリッドが再描画されます。</p>
    </aside>
    <main class="map-area">
      <div id="map"></div>
    </main>
  </div>

  <div id="map-error" class="map-error hidden">
    <div class="map-error-card">
      <h2>Google マップの読み込みに失敗しました</h2>
      <p id="map-error-text">APIキー、APIの有効化、またはアクセス制限を確認してください。</p>
    </div>
  </div>

  <script src="script.js"></script>
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC-NtJJ41MOLTbqauX5EwzhRcwYUvEc6Bg&libraries=places&callback=initMap"
    onerror="onMapsApiLoadError()">
  </script>
</body>
</html>
